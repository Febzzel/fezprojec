<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Soal PAI Kelas X — Semester Genap</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3c;
    --gold: #c8922a;
    --cream: #fdf8ee;
    --dark: #1a1a2e;
    --text: #2d2d2d;
    --border: #e2d6b8;
    --soft: #f5efe0;
    --answered: #e8f5ee;
    --answered-border: #1a6b3c;
    --correct: #e8f5ee;
    --correct-border: #1a6b3c;
    --wrong: #fdecea;
    --wrong-border: #d93025;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--green) 0%, #0f4a2a 100%);
    color: white;
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header-ornament {
    font-family: 'Amiri', serif;
    font-size: 22px;
    color: #f0d080;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .header-sub {
    font-size: 13px;
    opacity: 0.85;
    margin-bottom: 16px;
  }
  .header-meta {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .meta-pill {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Progress bar */
  .progress-wrap {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-label { font-size: 12px; color: #666; white-space: nowrap; }
  .progress-bar-outer {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #2d9e5f);
    border-radius: 10px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-count { font-size: 12px; font-weight: 600; color: var(--green); white-space: nowrap; }

  /* Section divider */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 20px 8px;
  }
  .section-badge {
    background: var(--gold);
    color: white;
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    flex: 1;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Question card */
  .question-card {
    margin: 8px 16px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .question-card.answered {
    border-color: var(--answered-border);
    background: var(--answered);
  }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    min-width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--green);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .question-card.answered .q-num {
    background: #2d9e5f;
  }
  .q-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    padding-top: 4px;
  }
  .q-text .arabic {
    font-family: 'Amiri', serif;
    font-size: 18px;
    direction: rtl;
    display: block;
    text-align: right;
    margin: 6px 0;
    color: var(--dark);
  }

  /* Options */
  .options {
    padding: 8px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1.5px solid #e8e0cc;
    background: var(--cream);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13.5px;
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .option:hover { border-color: var(--gold); background: #fffbf0; }
  .option.selected {
    border-color: var(--green);
    background: #e8f5ee;
    font-weight: 500;
  }
  .option-letter {
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #777;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .option.selected .option-letter {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .option.correct {
    border-color: #1a6b3c !important;
    background: #e8f5ee !important;
    font-weight: 600;
  }
  .option.correct .option-letter {
    background: #1a6b3c !important;
    border-color: #1a6b3c !important;
    color: white !important;
  }
  .option.wrong {
    border-color: #d93025 !important;
    background: #fdecea !important;
  }
  .option.wrong .option-letter {
    background: #d93025 !important;
    border-color: #d93025 !important;
    color: white !important;
  }
  .option.show-correct {
    border-color: #1a6b3c !important;
    background: #e8f5ee !important;
    opacity: 0.7;
  }
  .option.show-correct .option-letter {
    background: #1a6b3c !important;
    border-color: #1a6b3c !important;
    color: white !important;
  }
  .option.disabled { pointer-events: none; opacity: 0.6; }
  .option.correct, .option.wrong, .option.show-correct { pointer-events: none; }
  .indicator {
    font-size: 16px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .question-card.correct-card { border-color: #1a6b3c; }
  .question-card.wrong-card { border-color: #d93025; }
  .q-num.correct-num { background: #1a6b3c; }
  .q-num.wrong-num { background: #d93025; }

  /* Footer */
  .footer-bar {
    background: white;
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    text-align: center;
    margin-top: 12px;
  }
  .score-btn {
    background: linear-gradient(135deg, var(--green), #0f4a2a);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .score-btn:active { transform: scale(0.97); }
  .score-btn:hover { opacity: 0.9; }

  /* Result modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .modal-icon { font-size: 48px; margin-bottom: 12px; }
  .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--dark); }
  .modal-score { font-size: 48px; font-weight: 700; color: var(--green); margin: 10px 0 4px; }
  .modal-sub { color: #666; font-size: 14px; margin-bottom: 20px; }
  .modal-breakdown {
    display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;
  }
  .modal-stat {
    flex: 1; padding: 10px 8px; border-radius: 8px; font-size: 13px;
  }
  .modal-stat.benar { background: #e8f5ee; color: #1a6b3c; font-weight: 600; }
  .modal-stat.salah { background: #fdecea; color: #d93025; font-weight: 600; }
  .modal-stat .stat-num { font-size: 24px; font-weight: 700; display: block; }
  .modal-close {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  @media (min-width: 600px) {
    .question-card { margin: 8px auto; max-width: 680px; }
    .section-header { max-width: 712px; margin: 0 auto; }
    .progress-wrap { max-width: 100%; }
    .footer-bar { padding: 20px; }
  }
</style>
</head>

</div>

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  let currentSection = '';

  questions.forEach((q) => {
    if (q.section !== currentSection) {
      currentSection = q.section;
      const sec = document.createElement('div');
      sec.className = 'section-header';
      sec.innerHTML = `
        <span class="section-badge">Materi</span>
        <span class="section-title">${q.section}</span>
        <div class="section-line"></div>
      `;
      container.appendChild(sec);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${q.no}`;

    const optionsHtml = q.options.map((opt, i) => `
      <div class="option" id="opt-${q.no}-${i}" onclick="selectOption(${q.no}, ${i})">
        <div class="option-letter">${letters[i]}</div>
        <div style="flex:1">${opt}</div>
        <div class="indicator" id="ind-${q.no}-${i}"></div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num" id="qnum-${q.no}">${q.no}</div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="options">${optionsHtml}</div>
    `;
    container.appendChild(card);
  });
}

function selectOption(qNo, optIdx) {
  if (revealed) return;
  const prev = answered[qNo];
  if (prev !== undefined) {
    document.getElementById(`opt-${qNo}-${prev}`).classList.remove('selected');
  }
  document.getElementById(`opt-${qNo}-${optIdx}`).classList.add('selected');
  const wasNew = answered[qNo] === undefined;
  answered[qNo] = optIdx;
  document.getElementById(`card-${qNo}`).classList.add('answered');
  if (wasNew) updateProgress();
}

function updateProgress() {
  const count = Object.keys(answered).length;
  const pct = (count / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${count} / ${questions.length}`;
}

function showScore() {
  revealed = true;
  let benar = 0, salah = 0, kosong = 0;

  questions.forEach((q) => {
    const correctIdx = answerKey[q.no];
    const userIdx = answered[q.no];
    const card = document.getElementById(`card-${q.no}`);
    const qnum = document.getElementById(`qnum-${q.no}`);

    // Disable all options
    q.options.forEach((_, i) => {
      const opt = document.getElementById(`opt-${q.no}-${i}`);
      opt.classList.remove('selected');
      opt.style.pointerEvents = 'none';
    });

    if (userIdx === undefined) {
      // Not answered — just show correct answer
      kosong++;
      const correctOpt = document.getElementById(`opt-${q.no}-${correctIdx}`);
      correctOpt.classList.add('show-correct');
      document.getElementById(`ind-${q.no}-${correctIdx}`).textContent = '✅';
      card.style.borderColor = '#aaa';
    } else if (userIdx === correctIdx) {
      // Correct
      benar++;
      const opt = document.getElementById(`opt-${q.no}-${userIdx}`);
      opt.classList.add('correct');
      document.getElementById(`ind-${q.no}-${userIdx}`).textContent = '✅';
      card.classList.add('correct-card');
      qnum.style.background = '#1a6b3c';
    } else {
      // Wrong
      salah++;
      const wrongOpt = document.getElementById(`opt-${q.no}-${userIdx}`);
      wrongOpt.classList.add('wrong');
      document.getElementById(`ind-${q.no}-${userIdx}`).textContent = '❌';
      const correctOpt = document.getElementById(`opt-${q.no}-${correctIdx}`);
      correctOpt.classList.add('show-correct');
      correctOpt.style.opacity = '1';
      document.getElementById(`ind-${q.no}-${correctIdx}`).textContent = '✅';
      card.classList.add('wrong-card');
      qnum.style.background = '#d93025';
    }
  });

  const total = questions.length;
  const nilai = Math.round((benar / total) * 100);
  let icon = nilai >= 90 ? '🏆' : nilai >= 75 ? '👍' : nilai >= 60 ? '📝' : '💪';

  document.getElementById('modalIcon').textContent = icon;
  document.getElementById('modalScore').textContent = `Nilai: ${nilai}`;
  document.getElementById('modalSub').textContent = `dari ${total} soal`;
  document.getElementById('statBenar').textContent = benar;
  document.getElementById('statSalah').textContent = salah;
  document.getElementById('modalOverlay').classList.add('show');

  // Update footer button
  document.querySelector('.score-btn').textContent = '✅ Sudah Dinilai';
  document.querySelector('.score-btn').style.opacity = '0.6';
  document.querySelector('.score-btn').style.pointerEvents = 'none';
}
